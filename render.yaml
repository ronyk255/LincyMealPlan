services:
  - type: web
    name: lincy-meal-plan
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: LINCY_DB
        value: /var/data/lincy.sqlite
      - key: LINCY_ADMIN_SETUP_CODE
        sync: false
    disk:
      name: lincy-data
      mountPath: /var/data
      sizeGB: 1
