<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Updating Lincy...</title>
  <style>
    :root { color: #173f35; background: #f7f4ed; font-family: system-ui, sans-serif; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; text-align: center; }
    main { padding: 32px; }
    .spinner { width: 42px; height: 42px; margin: 0 auto 20px; border: 4px solid #e7e3d9; border-top-color: #ed795d; border-radius: 50%; animation: spin .7s linear infinite; }
    h1 { margin: 0 0 8px; font-family: Georgia, serif; }
    p { margin: 0; color: #687a74; }
    a { display: inline-block; margin-top: 20px; color: #d85f45; font-weight: 700; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main>
    <div class="spinner" aria-hidden="true"></div>
    <h1>Loading the latest Lincy</h1>
    <p>Clearing old website files. Your meal plans will stay safe.</p>
    <a id="continueLink" href="./">Continue to Lincy</a>
  </main>
  <script>
    (async () => {
      try {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(registration => registration.unregister()));
        }
        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(key => caches.delete(key)));
        }
      } finally {
        const destination = `./?fresh=${Date.now()}`;
        document.getElementById("continueLink").href = destination;
        window.location.replace(destination);
      }
    })();
  </script>
</body>
</html>
